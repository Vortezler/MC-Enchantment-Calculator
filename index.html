<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="A Minecraft toolbox: enchantment-order optimizer, Nether travel calculator, and world-map seed explorer — all in one place.">
<title>Minecraft Toolbox — Enchant · Nether · World Map</title>
<link rel="stylesheet" href="theme.css">
<style>
:root{
  --px:'Press Start 2P','Courier New',monospace;
  --mono:'Cascadia Mono','Consolas',ui-monospace,Menlo,monospace;
  --bar:#0c0a12; --bar2:#171326; --ink:#e9e3f4; --dim:#8b8199; --line:#241c33;
  --enchant:#b56bff; --nether:#ff8a3c; --world:#43d17f;
  --bev-out: inset 0 2px 0 rgba(255,255,255,.06), inset 2px 0 0 rgba(255,255,255,.04),
             inset 0 -2px 0 rgba(0,0,0,.55), inset -2px 0 0 rgba(0,0,0,.4), 0 3px 0 rgba(0,0,0,.35);
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{background:#0b0912; font-family:var(--mono); color:var(--ink); overflow:hidden;
  display:flex; flex-direction:column}

.appbar{flex:none; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  padding:10px 14px; background:var(--bar); border-bottom:2px solid var(--line); z-index:2}
.brand{font-family:var(--px); font-size:9px; letter-spacing:1px; color:var(--dim); white-space:nowrap}
.brand b{color:var(--enchant)}
.tabbar{display:flex; gap:8px; flex-wrap:wrap}
.tab{font-family:var(--px); font-size:8px; letter-spacing:1px; color:var(--dim); background:var(--bar2);
  box-shadow:var(--bev-out); padding:12px 14px; border:0; cursor:pointer}
.tab:hover{color:var(--ink); background:#20193a}
.tab[aria-selected="true"]{color:var(--acc); box-shadow:var(--bev-out), inset 0 -3px 0 var(--acc)}
.tab:active{transform:translateY(1px)}
.tab:focus-visible{outline:2px dashed var(--acc, #fff); outline-offset:2px}
.tab.enchant{--acc:var(--enchant)} .tab.nether{--acc:var(--nether)} .tab.world{--acc:var(--world)}

.frames{position:relative; flex:1 1 auto; min-height:0}
.frames iframe{position:absolute; inset:0; width:100%; height:100%; border:0; background:#0b0912;
  display:none}
.frames iframe.active{display:block}

/* first-load hint fades once frames are ready */
.loading{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:var(--px); font-size:9px; color:var(--dim); letter-spacing:1px; background:#0b0912;
  z-index:1; transition:opacity .4s ease}
.loading.gone{opacity:0; pointer-events:none}
</style>
</head>
<body>
<div class="appbar">
  <span class="brand">MC&nbsp;<b>TOOLBOX</b></span>
  <div class="tabbar" role="tablist" aria-label="Tools">
    <button class="tab enchant" role="tab" id="tab-enchant" data-tool="enchant" aria-selected="true"  aria-controls="fr-enchant">ENCHANT ORDER</button>
    <button class="tab nether"  role="tab" id="tab-nether"  data-tool="nether"  aria-selected="false" aria-controls="fr-nether">NETHER TRAVEL</button>
    <button class="tab world"   role="tab" id="tab-world"   data-tool="world"   aria-selected="false" aria-controls="fr-world">WORLD MAP</button>
  </div>
</div>

<div class="frames">
  <div class="loading" id="loading">LOADING TOOLS…</div>
  <iframe class="active" id="fr-enchant" data-tool="enchant" src="enchant.html"  title="Enchant Order"></iframe>
  <iframe id="fr-nether"  data-tool="nether" src="nether.html"   title="Nether Travel"></iframe>
  <iframe id="fr-world"   data-tool="world"  src="worldmap.html" title="World Map"></iframe>
</div>

<script>
"use strict";
const TOOLS = ["enchant", "nether", "world"];
const tabs = [...document.querySelectorAll(".tab")];
const frames = [...document.querySelectorAll(".frames iframe")];

function toolFromHash(){
  const h = location.hash.replace("#", "");
  return TOOLS.includes(h) ? h : "enchant";
}
function render(){
  const tool = toolFromHash();
  tabs.forEach(t => t.setAttribute("aria-selected", String(t.dataset.tool === tool)));
  frames.forEach(f => f.classList.toggle("active", f.dataset.tool === tool));
}

/* clicking a tab just updates the hash — no navigation, no reload.
   The matching iframe is already loaded and its state is preserved. */
tabs.forEach(t => t.addEventListener("click", () => {
  if (toolFromHash() !== t.dataset.tool) location.hash = t.dataset.tool;
  else render();
}));
window.addEventListener("hashchange", render);

/* keyboard: left/right arrows move between tabs */
document.querySelector(".tabbar").addEventListener("keydown", e => {
  if (e.key !== "ArrowRight" && e.key !== "ArrowLeft") return;
  e.preventDefault();
  const cur = tabs.findIndex(t => t.getAttribute("aria-selected") === "true");
  const next = (cur + (e.key === "ArrowRight" ? 1 : tabs.length - 1)) % tabs.length;
  location.hash = tabs[next].dataset.tool;
  tabs[next].focus();
});

/* dismiss the first-load hint once every frame has loaded once */
let loaded = 0;
frames.forEach(f => f.addEventListener("load", () => {
  if (++loaded >= frames.length){
    const el = document.getElementById("loading");
    el.classList.add("gone");
    setTimeout(() => el.remove(), 500);
  }
}));

render();
</script>
</body>
</html>
